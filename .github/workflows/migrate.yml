name: Migrate database on deploy

on:
  push:
    branches:
      - main
    paths:
      - 'prisma/migrations/**'
      - 'prisma/schema.prisma'
  # Manual trigger — needed to re-apply migrations when a run fails for a
  # non-schema reason (e.g. the 2026-06 lockfile desync broke npm ci here
  # while pushes that fixed it didn't touch prisma/** and so never re-fired).
  workflow_dispatch:

jobs:
  migrate:
    name: Run Prisma migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npx tsx scripts/migrate-deploy.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
