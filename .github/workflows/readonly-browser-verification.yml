name: Read-only browser verification

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Non-production URL to verify (for example, a Vercel preview deployment)
        required: true
        type: string

permissions:
  contents: read

jobs:
  readonly-browser-verification:
    name: Guarded read-only Playwright evidence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      E2E_BASE_URL: ${{ inputs.base_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run guarded read-only browser suite
        run: npm run e2e:readonly

      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: readonly-browser-evidence-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            playwright-report
            test-results
